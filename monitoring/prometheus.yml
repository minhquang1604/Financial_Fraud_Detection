global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'fraud-detection'
    static_configs:
      - targets: ['api:8000', 'monitoring:8001']
        labels:
          service: 'fraud-detection'
          environment: 'production'

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
        labels:
          service: 'kafka'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
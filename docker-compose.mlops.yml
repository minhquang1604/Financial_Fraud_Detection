version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fraud-network
    healthcheck:
      test: echo stat | nc zookeeper 2181
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: fraud-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - fraud-network

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud-kafka-setup
    depends_on:
      kafka:
        condition: service_started
    command: >
      bash -c "
        echo 'Waiting for Kafka to be ready...'
        cub kafka-ready 1 40 || exit 1
        echo 'Creating topics...'
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 1 --topic transaction_events
        echo 'Topics created successfully'
      "
    networks:
      - fraud-network

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: fraud-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - fraud-network

  grafana:
    image: grafana/grafana:10.1.0
    container_name: fraud-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - fraud-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: fraud-mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_ARTIFACT_ROOT: s3://mlflow-artifacts/
    volumes:
      - mlflow-data:/mlflow
    networks:
      - fraud-network

alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: fraud-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - fraud-network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-10-25T06-33-25Z
    container_name: fraud-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - fraud-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - API_URL=http://api:8000
    depends_on:
      - kafka
      - mlflow
      - prometheus
    networks:
      - fraud-network
    volumes:
      - ./model:/app/model
      - ./data:/app/data

  staging-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-staging-consumer
    command: python -m src.staging.staging_consumer
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - STAGING_OUTPUT_DIR=/app/data/staging
    depends_on:
      - kafka
    networks:
      - fraud-network
    volumes:
      - ./data/staging:/app/data/staging

  monitoring:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-monitoring
    command: python -m src.monitoring_server
    ports:
      - "8001:8001"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=/app/model/fraud_model.pkl
      - PROMETHEUS_PORT=8001
    depends_on:
      - api
      - prometheus
    networks:
      - fraud-network
    volumes:
      - ./model:/app/model
      - ./monitoring:/app/monitoring

networks:
  fraud-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  mlflow-data:
  minio-data: